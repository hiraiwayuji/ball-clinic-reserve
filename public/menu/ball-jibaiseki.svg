<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <clipPath id="circ"><circle cx="450" cy="360" r="190"/></clipPath>
  </defs>

  <rect width="900" height="1200" fill="url(#g)"/>
  <rect width="900" height="20" fill="#2563eb"/>

  <!-- イラスト枠 -->
  <circle cx="450" cy="360" r="190" fill="#eaf1fe" stroke="#2563eb" stroke-width="8"/>

  <!-- 衝突シーン（円でクリップ） -->
  <g clip-path="url(#circ)">
    <!-- 路面と影 -->
    <ellipse cx="450" cy="422" rx="178" ry="18" fill="#1e293b" opacity="0.12"/>
    <rect x="270" y="408" width="360" height="7" rx="3" fill="#94a3b8" opacity="0.55"/>

    <!-- 左の車（青・右向き） -->
    <g>
      <rect x="296" y="360" width="158" height="50" rx="14" fill="#3b82f6"/>
      <path d="M330 360 L350 328 L414 328 L432 360 Z" fill="#3b82f6"/>
      <path d="M346 356 L360 336 L408 336 L420 356 Z" fill="#cfe2ff"/>
      <rect x="447" y="378" width="11" height="13" rx="3" fill="#fde68a"/>
      <circle cx="342" cy="410" r="23" fill="#1f2937"/><circle cx="342" cy="410" r="9" fill="#cbd5e1"/>
      <circle cx="424" cy="410" r="23" fill="#1f2937"/><circle cx="424" cy="410" r="9" fill="#cbd5e1"/>
    </g>

    <!-- 右の車（赤・左向き） -->
    <g>
      <rect x="446" y="360" width="158" height="50" rx="14" fill="#ef4444"/>
      <path d="M468 360 L486 328 L550 328 L570 360 Z" fill="#ef4444"/>
      <path d="M480 356 L492 336 L540 336 L554 356 Z" fill="#fde0df"/>
      <rect x="442" y="378" width="11" height="13" rx="3" fill="#fde68a"/>
      <circle cx="476" cy="410" r="23" fill="#1f2937"/><circle cx="476" cy="410" r="9" fill="#cbd5e1"/>
      <circle cx="558" cy="410" r="23" fill="#1f2937"/><circle cx="558" cy="410" r="9" fill="#cbd5e1"/>
    </g>

    <!-- 衝突の閃光（スターバースト） -->
    <polygon points="524,386 485,400 502,438 465,421 450,460 436,421 398,438 415,400 376,386 415,372 398,334 436,351 450,312 465,351 502,334 485,372"
             fill="#facc15" stroke="#f59e0b" stroke-width="6" stroke-linejoin="round"/>
    <polygon points="490,386 468.5,393.6 478.3,414.3 457.6,404.5 450,426 442.3,404.5 421.7,414.3 431.5,393.6 410,386 431.5,378.4 421.7,357.7 442.3,367.5 450,346 457.6,367.5 478.3,357.7 468.5,378.4"
             fill="#fff3b0"/>

    <!-- 飛び散り -->
    <circle cx="486" cy="306" r="7" fill="#f59e0b"/>
    <rect x="408" y="300" width="13" height="13" rx="3" fill="#fbbf24" transform="rotate(22 414 306)"/>
    <circle cx="540" cy="340" r="6" fill="#fbbf24"/>
    <circle cx="362" cy="346" r="6" fill="#f59e0b"/>
  </g>

  <!-- 見出し -->
  <text x="450" y="690" font-size="130" font-weight="900" fill="#2a2320" text-anchor="middle">自賠責施術</text>
  <text x="450" y="772" font-size="46" font-weight="700" fill="#1d4ed8" text-anchor="middle">交通事故のケガ・むち打ちに</text>

  <!-- 価格ピル -->
  <rect x="120" y="880" width="660" height="150" rx="28" fill="#2563eb"/>
  <text x="450" y="958" font-size="60" font-weight="900" fill="#ffffff" text-anchor="middle">窓口負担 0円</text>

  <text x="450" y="1090" font-size="40" font-weight="700" fill="#6f655e" text-anchor="middle">事故後の通院をしっかりサポート</text>
</svg>
